services:
  - type: web
    name: local-light-novel-writer
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: LN_HOST
        value: 0.0.0.0
      - key: LN_MODEL
        value: gemma4:e4b-it-q4_K_M
      - key: LN_STYLE_EXAMPLE
        value: "1"
      - key: LN_POLISH
        value: auto
      - key: LN_CLOUD_CTX_MULT
        value: "3"
      # Render does not run Ollama for you. Leave this as-is if you will use
      # browser-saved cloud keys, or point it at your own reachable Ollama host.
      - key: OLLAMA_HOST
        value: http://127.0.0.1:11434
